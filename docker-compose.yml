version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: soilsense-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: soilsense-backend
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=soil_sense
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-strong-secret}
      - USE_GPU=false
    depends_on:
      - mongodb
    volumes:
      - model_cache:/root/.cache
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: soilsense-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  model_cache:
